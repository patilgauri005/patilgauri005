<svg viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#8B85FF"/>
      <stop offset="100%" stop-color="#6C63FF"/>
    </linearGradient>
    <linearGradient id="headGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#E8E8F5"/>
    </linearGradient>
  </defs>

  <!-- gentle bob for whole character -->
  <g>
    <animateTransform attributeName="transform" type="translate"
      values="0,0; 0,-8; 0,0" dur="2s" repeatCount="indefinite"/>

    <!-- shadow -->
    <ellipse cx="150" cy="255" rx="55" ry="10" fill="#000" opacity="0.08"/>

    <!-- antenna -->
    <line x1="150" y1="55" x2="150" y2="30" stroke="#6C63FF" stroke-width="4" stroke-linecap="round"/>
    <circle cx="150" cy="26" r="7" fill="#FFC85C">
      <animate attributeName="opacity" values="1;0.4;1" dur="1.2s" repeatCount="indefinite"/>
    </circle>

    <!-- head -->
    <rect x="95" y="55" width="110" height="90" rx="30" fill="url(#headGrad)" stroke="#6C63FF" stroke-width="3"/>

    <!-- face screen -->
    <rect x="112" y="75" width="76" height="46" rx="14" fill="#2B2B45"/>

    <!-- eyes -->
    <circle cx="135" cy="98" r="7" fill="#8FF0FF">
      <animate attributeName="ry" values="7;1;7" dur="4s" repeatCount="indefinite" begin="1s"/>
    </circle>
    <circle cx="165" cy="98" r="7" fill="#8FF0FF">
      <animate attributeName="ry" values="7;1;7" dur="4s" repeatCount="indefinite" begin="1s"/>
    </circle>

    <!-- smile -->
    <path d="M 138 108 Q 150 116 162 108" stroke="#8FF0FF" stroke-width="3" fill="none" stroke-linecap="round"/>

    <!-- body -->
    <rect x="105" y="150" width="90" height="80" rx="24" fill="url(#bodyGrad)" stroke="#5148E0" stroke-width="3"/>

    <!-- chest light -->
    <circle cx="150" cy="190" r="14" fill="#FFC85C" opacity="0.95">
      <animate attributeName="opacity" values="0.95;0.5;0.95" dur="1.6s" repeatCount="indefinite"/>
    </circle>

    <!-- left arm (static, resting) -->
    <rect x="88" y="165" width="18" height="45" rx="9" fill="#8B85FF" stroke="#5148E0" stroke-width="2"/>

    <!-- right arm (waving) -->
    <g transform="translate(205,168)">
      <g>
        <animateTransform attributeName="transform" type="rotate"
          values="0 0 0; -35 0 0; 0 0 0; -35 0 0; 0 0 0"
          dur="1.6s" repeatCount="indefinite"/>
        <rect x="0" y="0" width="18" height="45" rx="9" fill="#8B85FF" stroke="#5148E0" stroke-width="2"/>
        <circle cx="9" cy="48" r="11" fill="#E8E8F5" stroke="#6C63FF" stroke-width="2"/>
      </g>
    </g>

    <!-- legs -->
    <rect x="118" y="228" width="16" height="26" rx="8" fill="#5148E0"/>
    <rect x="166" y="228" width="16" height="26" rx="8" fill="#5148E0"/>
  </g>
</svg>
